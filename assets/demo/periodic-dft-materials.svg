<title id="title">Periodic DFT and materials evidence chain</title><desc id="desc">Synthetic TsaoDFT demonstration figure; not scientific data.</desc>
<defs>
<style><![CDATA[
  .bg { fill:#f8fafc; } .panel { fill:#fff; stroke:#cbd5e1; stroke-width:1.2; }
  .title { font:700 24px Arial,Helvetica,sans-serif; fill:#0f172a; }
  .subtitle { font:400 13px Arial,Helvetica,sans-serif; fill:#475569; }
  .head { font:700 15px Arial,Helvetica,sans-serif; fill:#0f172a; }
  .body { font:400 12px Arial,Helvetica,sans-serif; fill:#334155; }
  .small { font:400 10px Arial,Helvetica,sans-serif; fill:#64748b; }
  .mono { font:600 10px Consolas,Menlo,monospace; fill:#334155; }
