name: Apply governed AI README patch

on:
  push:
    branches: [main]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  apply:
    if: >-
      (github.event_name == 'issues' && contains(github.event.issue.title, 'apply governed AI README patch')) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, 'trigger governed AI README patch'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply patch, validate, test and publish to main
        run: python _patch_bootstrap/apply_patch.py
