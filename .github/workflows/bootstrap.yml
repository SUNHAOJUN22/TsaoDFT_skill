name: Bootstrap integrated TsaoDFT repository

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    if: contains(github.event.head_commit.message, 'bootstrap integrated TsaoDFT repository')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Reconstruct, validate and publish repository
        run: python _bootstrap/install_bundle.py
