<rect class="bg" width="100%" height="100%" rx="18"/>
<text class="title" x="32" y="40">DFT + ML active-learning loop</text>
<text class="subtitle" x="32" y="64">Independent groups, calibrated uncertainty and accepted-label feedback.</text><rect x="435" y="92" width="210" height="76" rx="16" fill="#dbeafe" stroke="#2563eb"/><text class="head" x="540" y="135" text-anchor="middle">Accepted DFT data</text><rect x="695" y="202" width="210" height="76" rx="16" fill="#dcfce7" stroke="#16a34a"/><text class="head" x="800" y="245" text-anchor="middle">Train + calibrate</text><rect x="545" y="322" width="210" height="76" rx="16" fill="#fef3c7" stroke="#d97706"/><text class="head" x="650" y="365" text-anchor="middle">Acquire uncertain + diverse</text><rect x="245" y="322" width="210" height="76" rx="16" fill="#ffe4e6" stroke="#e11d48"/><text class="head" x="350" y="365" text-anchor="middle">Structure + method gate</text><rect x="95" y="202" width="210" height="76" rx="16" fill="#f3e8ff" stroke="#9333ea"/><text class="head" x="200" y="245" text-anchor="middle">Run and validate DFT</text><path d="M540,172 Q670.0,185.0 800,198" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><path d="M800,282 Q725.0,300.0 650,318" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><path d="M650,402 Q500.0,360.0 350,318" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><path d="M350,402 Q275.0,300.0 200,198" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><path d="M200,282 Q370.0,185.0 540,88" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/><rect x="365" y="205" width="350" height="64" rx="14" fill="#fff" stroke="#cbd5e1"/><text class="body" x="540" y="230" text-anchor="middle">parent/scaffold/group split · train-only preprocessing</text><text class="body" x="540" y="251" text-anchor="middle">applicability domain · seeds/folds · no test leakage</text>
<text class="notice" x="1052" y="462" text-anchor="end">SYNTHETIC DEMO · NOT SCIENTIFIC DATA</text>
