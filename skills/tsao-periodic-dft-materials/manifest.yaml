version: 0.3.0-alpha.1
always_load:
- references/periodic-contract.md
- references/validation.md
routes:
  ground_state:
    triggers:
    - relax
    - static
    - SCF
    - kpoint
    - cutoff
    - convergence
    load:
    - references/convergence.md
    - references/engine-adapters.md
  electronic:
    triggers:
    - band
    - DOS
    - PDOS
    - charge density
    - Bader
    - work function
    - ELF
    - spin density
    load:
    - references/electronic-properties.md
    - references/engine-adapters.md
  surface_defect:
    triggers:
    - surface
    - slab
    - adsorption
    - defect
    - formation energy
    - vacancy
    load:
    - references/surfaces-defects.md
    - references/energy-expressions.md
  reaction_path:
    triggers:
    - NEB
    - diffusion
    - migration
    - reaction path
    - dimer
    load:
    - references/neb.md
    - references/energy-expressions.md
  lattice_properties:
    triggers:
    - phonon
    - vibration
    - elastic
    - modulus
    load:
    - references/phonon-elastic.md
  high_throughput:
    triggers:
    - AiiDA
    - atomate2
    - ASE
    - high throughput
    - campaign
    load:
    - references/high-throughput.md
