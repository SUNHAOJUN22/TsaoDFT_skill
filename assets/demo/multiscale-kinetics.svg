<text class="title" x="32" y="40">DFT to kinetics and multiscale models</text>
<text class="subtitle" x="32" y="64">Thermochemistry is transformed only through explicit standard-state and model contracts.</text><circle cx="50" cy="215" r="82" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/><text class="head" x="50" y="207" text-anchor="middle">Accepted ΔG / ΔG‡</text><text class="small" x="50" y="230" text-anchor="middle">temperature · phase · state</text><path d="M134,215 H189" stroke="#64748b" stroke-width="2"/><path d="M189,215 l-8,-5 v10 z" fill="#64748b"/><circle cx="275" cy="215" r="82" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/><text class="head" x="275" y="207" text-anchor="middle">TST rates</text><text class="small" x="275" y="230" text-anchor="middle">κ · degeneracy · units</text><path d="M359,215 H414" stroke="#64748b" stroke-width="2"/><path d="M414,215 l-8,-5 v10 z" fill="#64748b"/><circle cx="500" cy="215" r="82" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/><text class="head" x="500" y="207" text-anchor="middle">Reaction network</text><text class="small" x="500" y="230" text-anchor="middle">balance · detailed balance</text><path d="M584,215 H639" stroke="#64748b" stroke-width="2"/><path d="M639,215 l-8,-5 v10 z" fill="#64748b"/><circle cx="725" cy="215" r="82" fill="#f3e8ff" stroke="#9333ea" stroke-width="1.5"/><text class="head" x="725" y="207" text-anchor="middle">Microkinetics</text><text class="small" x="725" y="230" text-anchor="middle">coverage · sensitivity</text><path d="M809,215 H864" stroke="#64748b" stroke-width="2"/><path d="M864,215 l-8,-5 v10 z" fill="#64748b"/><circle cx="950" cy="215" r="82" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/><text class="head" x="950" y="207" text-anchor="middle">Reactor / PBE</text><text class="small" x="950" y="230" text-anchor="middle">transport · fitting</text><rect x="225" y="340" width="670" height="58" rx="14" fill="#fff" stroke="#cbd5e1"/><text class="body" x="560" y="365" text-anchor="middle">1 atm · 1 M · surface/site standard states are not interchangeable</text><text class="small" x="560" y="384" text-anchor="middle">fitted parameters remain labeled separately from first-principles values</text>
