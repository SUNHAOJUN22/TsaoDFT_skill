</defs>
<rect class="bg" width="100%" height="100%" rx="18"/>
<text class="title" x="32" y="40">Periodic DFT and materials evidence chain</text>
<text class="subtitle" x="32" y="64">One method fingerprint, convergence gates and property-specific parents.</text><rect x="36" y="120" width="190" height="150" rx="18" fill="#dbeafe" stroke="#2563eb"/><text class="head" x="54" y="158">Reviewed structure</text><text class="body" x="54" y="190">pymatgen / ASE</text><path d="M226,195 H244" stroke="#64748b" stroke-width="2"/><path d="M244,195 l-8,-5 v10 z" fill="#64748b"/><rect x="250" y="120" width="190" height="150" rx="18" fill="#fef3c7" stroke="#d97706"/><text class="head" x="268" y="158">Convergence</text><text class="body" x="268" y="190">k · cutoff · cell</text><path d="M440,195 H458" stroke="#64748b" stroke-width="2"/><path d="M458,195 l-8,-5 v10 z" fill="#64748b"/><rect x="464" y="120" width="190" height="150" rx="18" fill="#dcfce7" stroke="#16a34a"/><text class="head" x="482" y="158">Relax + SCF</text><text class="body" x="482" y="190">VASP · QE · CP2K</text><path d="M654,195 H672" stroke="#64748b" stroke-width="2"/><path d="M672,195 l-8,-5 v10 z" fill="#64748b"/><rect x="678" y="120" width="190" height="150" rx="18" fill="#f3e8ff" stroke="#9333ea"/><text class="head" x="696" y="158">Properties</text><text class="body" x="696" y="190">bands · DOS · phonons</text><path d="M868,195 H886" stroke="#64748b" stroke-width="2"/><path d="M886,195 l-8,-5 v10 z" fill="#64748b"/><rect x="892" y="120" width="190" height="150" rx="18" fill="#cffafe" stroke="#0891b2"/><text class="head" x="910" y="158">Accepted evidence</text><text class="body" x="910" y="190">energy expression + QA</text><rect x="250" y="310" width="642" height="70" rx="15" fill="#0f172a"/><text x="571" y="337" text-anchor="middle" style="font:700 13px Arial;fill:white">No mixed pseudopotentials, cutoffs, k-density, spin/U or correction policy</text><text x="571" y="359" text-anchor="middle" style="font:400 11px Arial;fill:#cbd5e1">surface / adsorption / defect / NEB expressions retain every reference term</text>
<text class="notice" x="1092" y="442" text-anchor="end">SYNTHETIC DEMO · NOT SCIENTIFIC DATA</text>
