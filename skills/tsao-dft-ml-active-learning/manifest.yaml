version: 0.4.0-alpha.1
always_load:
- references/data-contract.md
- references/ml-validation.md
- references/dft-dataset-model-cards.md
routes:
  dataset:
    triggers:
    - descriptor
    - fingerprint
    - graph
    - DeepChem
    - RDKit
    - dataset
    load:
    - references/features-models.md
  model:
    triggers:
    - surrogate
    - GNN
    - RF
    - GBDT
    - regression
    - classification
    load:
    - references/features-models.md
    - references/ml-validation.md
  validation:
    triggers:
    - leakage
    - split
    - cross validation
    - uncertainty
    - calibration
    - applicability domain
    - SHAP
    load:
    - references/ml-validation.md
    - references/explainability.md
  active_learning:
    triggers:
    - active learning
    - Bayesian optimization
    - acquisition
    - next calculations
    load:
    - references/active-learning.md
  inverse_design:
    triggers:
    - inverse design
    - generative
    - multi objective
    - Pareto
    load:
    - references/inverse-design.md
  baseline:
    triggers:
    - dataset card
    - model card
    - ridge baseline
    - DFT dataset validation
    load:
    - references/dft-dataset-model-cards.md
    - references/data-contract.md
    - references/ml-validation.md
