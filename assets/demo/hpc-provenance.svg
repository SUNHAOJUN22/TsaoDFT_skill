<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="450" viewBox="0 0 1120 450" role="img" aria-labelledby="title desc">
<title id="title">HPC execution and provenance</title><desc id="desc">Synthetic TsaoDFT demonstration figure; not scientific data.</desc>
<defs>
<style><![CDATA[
  .bg { fill:#f8fafc; } .panel { fill:#fff; stroke:#cbd5e1; stroke-width:1.2; }
  .title { font:700 24px Arial,Helvetica,sans-serif; fill:#0f172a; }
  .subtitle { font:400 13px Arial,Helvetica,sans-serif; fill:#475569; }
  .head { font:700 15px Arial,Helvetica,sans-serif; fill:#0f172a; }
  .body { font:400 12px Arial,Helvetica,sans-serif; fill:#334155; }
  .small { font:400 10px Arial,Helvetica,sans-serif; fill:#64748b; }
  .mono { font:600 10px Consolas,Menlo,monospace; fill:#334155; }
  .notice { font:700 10px Arial,Helvetica,sans-serif; fill:#9f1239; letter-spacing:.7px; }
]]></style>

</defs>
<rect class="bg" width="100%" height="100%" rx="18"/>
<text class="title" x="32" y="40">HPC execution and provenance</text>
<text class="subtitle" x="32" y="64">Execution is approval-gated; every attempt and checkpoint remains traceable.</text><rect x="42" y="125" width="180" height="155" rx="18" fill="#dbeafe" stroke="#64748b"/><text class="head" x="60" y="164">Plan</text><text class="body" x="60" y="197">inputs · cost · approval</text><text class="mono" x="60" y="244">attempt_01</text><path d="M222,202 H240" stroke="#64748b" stroke-width="2"/><path d="M240,202 l-8,-5 v10 z" fill="#64748b"/><rect x="250" y="125" width="180" height="155" rx="18" fill="#dcfce7" stroke="#64748b"/><text class="head" x="268" y="164">Job</text><text class="body" x="268" y="197">local · Slurm · PBS</text><text class="mono" x="268" y="244">attempt_02</text><path d="M430,202 H448" stroke="#64748b" stroke-width="2"/><path d="M448,202 l-8,-5 v10 z" fill="#64748b"/><rect x="458" y="125" width="180" height="155" rx="18" fill="#fef3c7" stroke="#64748b"/><text class="head" x="476" y="164">Monitor</text><text class="body" x="476" y="197">queue · logs · resources</text><text class="mono" x="476" y="244">attempt_03</text><path d="M638,202 H656" stroke="#64748b" stroke-width="2"/><path d="M656,202 l-8,-5 v10 z" fill="#64748b"/><rect x="666" y="125" width="180" height="155" rx="18" fill="#ffe4e6" stroke="#64748b"/><text class="head" x="684" y="164">Recover</text><text class="body" x="684" y="197">classify · one change</text><text class="mono" x="684" y="244">attempt_04</text><path d="M846,202 H864" stroke="#64748b" stroke-width="2"/><path d="M864,202 l-8,-5 v10 z" fill="#64748b"/><rect x="874" y="125" width="180" height="155" rx="18" fill="#f3e8ff" stroke="#64748b"/><text class="head" x="892" y="164">Provenance</text><text class="body" x="892" y="197">hashes · lineage · validator</text><text class="mono" x="892" y="244">attempt_05</text><rect x="250" y="324" width="622" height="56" rx="14" fill="#0f172a"/><text x="561" y="348" text-anchor="middle" style="font:700 13px Arial;fill:white">scheduler success ≠ engine validation ≠ scientific acceptance</text><text x="561" y="367" text-anchor="middle" style="font:400 11px Arial;fill:#cbd5e1">actual script · stdout/stderr · checkpoints · hashes · parser verdict</text>
<text class="notice" x="1092" y="432" text-anchor="end">SYNTHETIC DEMO · NOT SCIENTIFIC DATA</text>
</svg>